name: Verify SkillHot custom domain

on:
  schedule:
    # Recheck after the daily data deployment.
    - cron: '35 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify DNS and Pages binding
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOMAIN: skillhot.savs-ai.com
          EXPECTED_TARGET: savanna0425.github.io
        run: |
          set -euo pipefail
          target="$(dig +short CNAME "$DOMAIN" | sed 's/\.$//' | head -n 1)"
          current="$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.cname // ""')"
          echo "DNS target: ${target:-missing}"
          echo "Pages custom domain: ${current:-not configured}"
          test "$target" = "$EXPECTED_TARGET"
          test "$current" = "$DOMAIN"

      - name: Verify HTTPS site
        env:
          DOMAIN: skillhot.savs-ai.com
        run: |
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors \
            "https://$DOMAIN/" >/dev/null
