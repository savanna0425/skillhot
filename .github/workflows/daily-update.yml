name: Update SkillHot data

on:
  schedule:
    # 08:20 Asia/Shanghai (GitHub Actions cron uses UTC)
    - cron: '20 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: skillhot-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Refresh GitHub topics and repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-skills.mjs
      - name: Validate generated data
        run: node scripts/validate-data.mjs
      - name: Commit changed data
        run: |
          if git diff --quiet -- public/data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "Sav同学"
          git config user.email "83158499+savanna0425@users.noreply.github.com"
          git add public/data
          git commit -m "data: daily SkillHot update"
          git push

  # Commits created with GITHUB_TOKEN do not trigger the push workflow, so daily
  # snapshots deploy in this workflow as a separate job.
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test:e2e
      - run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
