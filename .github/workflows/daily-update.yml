name: Update SkillHot data

on:
  schedule:
    # 08:20 Asia/Shanghai (GitHub Actions cron uses UTC)
    - cron: '20 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: skillhot-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Refresh GitHub topics and repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-skills.mjs
      - name: Commit changed data
        run: |
          if git diff --quiet -- public/data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "skillhot-bot"
          git config user.email "skillhot-bot@users.noreply.github.com"
          git add public/data
          git commit -m "data: daily SkillHot update"
          git push
